
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>+3 Game - AI Games</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/plus3game.css">
</head>
<body>
<header>
    <h1>+3 Game</h1>
</header>
<main>
    <div id="game-container">
        <div id="question-area">
            <p>したのすうじにそれぞれ3をたしたすうじの1のくらいをいれてください</p>
            <div id="question"></div>
        </div>
        <div id="answers">
            <input type="number" class="answer-input" id="answer1" min="0" max="9" disabled>
            <input type="number" class="answer-input" id="answer2" min="0" max="9" disabled>
            <input type="number" class="answer-input" id="answer3" min="0" max="9" disabled>
            <input type="number" class="answer-input" id="answer4" min="0" max="9" disabled>
        </div>
        <button id="start-button">スタート</button>
        <button id="check-button">こたえあわせ</button>
        <div id="message"></div>
        <div id="timer">Time: 0s</div>
        <div id="score"></div>
    </div>
    <p>
        <div class="goback"><a href="./" class="back">戻る</a></div>
    </p>

    <script src="js/plus3game.js"></script>
    </main>
    <footer>
                <p>&copy; 2025 MITH@mmk</p>
    </footer>
</body>
</html>
